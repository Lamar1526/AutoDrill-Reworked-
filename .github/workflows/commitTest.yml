name: Build Mod

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin
      - name: Build mod jar
        run: |
          chmod +x ./gradlew
          ./gradlew jar
      - name: Delete old release if exists
        run: gh release delete v157.3 --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release with jar
        run: gh release create v157.3 build/libs/AutoDrillDesktop.jar --title "AutoDrill v157.3" --notes "Updated for Mindustry v157.3" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
